<!DOCTYPE html>
<html>
<head>

    <title>AI Spend Audit</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">

        <h1 class="text-4xl font-bold mb-6">
            AI Spend Audit Tool
        </h1>

        <p class="mb-8 text-gray-600">
            Discover where your startup is overspending on AI tools.
        </p>

        <form action="/audit" method="POST" class="space-y-8">

            <!-- ChatGPT Section -->
            <div class="border p-6 rounded-lg">

                <h2 class="text-2xl font-semibold mb-4">
                    ChatGPT
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                    <div>
                        <label class="block mb-2">Plan</label>

                        <select
                            name="chatgpt_plan"
                            class="w-full border rounded p-2"
                        >
                            <option value="plus">Plus</option>
                            <option value="team">Team</option>
                        </select>
                    </div>

                    <div>
                        <label class="block mb-2">
                            Monthly Spend ($)
                        </label>

                        <input
                            type="number"
                            name="chatgpt_spend"
                            class="w-full border rounded p-2"
                            required
                        >
                    </div>

                    <div>
                        <label class="block mb-2">
                            Team Size
                        </label>

                        <input
                            type="number"
                            name="chatgpt_users"
                            class="w-full border rounded p-2"
                            required
                        >
                    </div>

                </div>

            </div>

            <!-- Copilot Section -->
            <div class="border p-6 rounded-lg">

                <h2 class="text-2xl font-semibold mb-4">
                    GitHub Copilot
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                    <div>
                        <label class="block mb-2">Plan</label>

                        <select
                            name="copilot_plan"
                            class="w-full border rounded p-2"
                        >
                            <option value="individual">
                                Individual
                            </option>

                            <option value="business">
                                Business
                            </option>
                        </select>
                    </div>

                    <div>
                        <label class="block mb-2">
                            Monthly Spend ($)
                        </label>

                        <input
                            type="number"
                            name="copilot_spend"
                            class="w-full border rounded p-2"
                            required
                        >
                    </div>

                    <div>
                        <label class="block mb-2">
                            Team Size
                        </label>

                        <input
                            type="number"
                            name="copilot_users"
                            class="w-full border rounded p-2"
                            required
                        >
                    </div>

                </div>

            </div>


            <!-- Cursor Section -->
<div class="border p-6 rounded-lg">

    <h2 class="text-2xl font-semibold mb-4">
        Cursor
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div>
            <label class="block mb-2">Plan</label>

            <select
                name="cursor_plan"
                class="w-full border rounded p-2"
            >
                <option value="pro">Pro</option>
                <option value="business">Business</option>
            </select>
        </div>

        <div>
            <label class="block mb-2">
                Monthly Spend ($)
            </label>

            <input
                type="number"
                name="cursor_spend"
                class="w-full border rounded p-2"
            >
        </div>

        <div>
            <label class="block mb-2">
                Team Size
            </label>

            <input
                type="number"
                name="cursor_users"
                class="w-full border rounded p-2"
            >
        </div>

    </div>

</div>


<!-- Claude Section -->
<div class="border p-6 rounded-lg">

    <h2 class="text-2xl font-semibold mb-4">
        Claude
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div>
            <label class="block mb-2">Plan</label>

            <select
                name="claude_plan"
                class="w-full border rounded p-2"
            >
                <option value="pro">Pro</option>
                <option value="team">Team</option>
            </select>
        </div>

        <div>
            <label class="block mb-2">
                Monthly Spend ($)
            </label>

            <input
                type="number"
                name="claude_spend"
                class="w-full border rounded p-2"
            >
        </div>

        <div>
            <label class="block mb-2">
                Team Size
            </label>

            <input
                type="number"
                name="claude_users"
                class="w-full border rounded p-2"
            >
        </div>

    </div>

</div>


<!-- Gemini Section -->
<div class="border p-6 rounded-lg">

    <h2 class="text-2xl font-semibold mb-4">
        Gemini
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div>
            <label class="block mb-2">Plan</label>

            <select
                name="gemini_plan"
                class="w-full border rounded p-2"
            >
                <option value="pro">Pro</option>
                <option value="ultra">Ultra</option>
            </select>
        </div>

        <div>
            <label class="block mb-2">
                Monthly Spend ($)
            </label>

            <input
                type="number"
                name="gemini_spend"
                class="w-full border rounded p-2"
            >
        </div>

        <div>
            <label class="block mb-2">
                Team Size
            </label>

            <input
                type="number"
                name="gemini_users"
                class="w-full border rounded p-2"
            >
        </div>

    </div>

</div>

            <!-- Use Case -->
            <div>

                <label class="block mb-2 text-lg font-medium">
                    Primary Use Case
                </label>

                <select
                    name="use_case"
                    class="w-full border rounded p-3"
                >
                    <option value="coding">Coding</option>
                    <option value="writing">Writing</option>
                    <option value="research">Research</option>
                    <option value="mixed">Mixed</option>
                </select>

            </div>

            <button
                type="submit"
                class="bg-black text-white px-6 py-3 rounded-lg hover:opacity-90"
            >
                Audit My Spend
            </button>

        </form>

    </div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
